# .github/workflows/ci.yml
#
# CI for pyLabHub — build and test on Linux.
# macOS and Windows support deferred.

name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Linux (GCC ${{ matrix.gcc }}, ${{ matrix.build_type }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        gcc: [13, 14]
        build_type: [Release, Debug]

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            g++-${{ matrix.gcc }} \
            autoconf \
            automake \
            libtool \
            pkg-config \
            python3-dev

      - name: Configure
        env:
          CC: gcc-${{ matrix.gcc }}
          CXX: g++-${{ matrix.gcc }}
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DBUILD_TESTS=ON \
            -DBUILD_XOP=OFF \
            -DPYLABHUB_PREPARE_PYTHON_ENV=OFF \
            -DPYLABHUB_CREATE_INSTALL_TARGET=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build -j$(nproc) --output-on-failure --timeout 120
