# .github/workflows/publish-pypi.yml
#
# Build platform wheels via cibuildwheel and publish to PyPI.
#
# The wheel contains prebuilt C++ binaries (hubshell, producer, consumer,
# processor), the shared library, and public headers.  The Python 3.14
# runtime is NOT bundled --- users install it post-install via
# 'pylabhub prepare-runtime'.  One wheel per platform serves all host
# Python versions (>= 3.9).
#
# Triggers:
#   - Push a version tag (v*) → build wheels + publish to PyPI
#   - workflow_dispatch       → build wheels + publish to TestPyPI
#
# Setup required:
#   1. Configure PyPI trusted publishing (OIDC) or add PYPI_API_TOKEN secret
#   2. For testing: add TEST_PYPI_API_TOKEN secret
#   3. Tag releases: git tag v0.1.0a0 && git push --tags

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # -----------------------------------------------------------------------
  # Build platform wheels
  # -----------------------------------------------------------------------
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        # macOS and Windows wheels deferred:
        # os: [ubuntu-24.04, macos-14, windows-2022]

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        env:
          # Build ONE wheel per platform. The C++ binaries embed Python 3.14
          # (downloaded post-install via 'pylabhub prepare-runtime'), so one
          # wheel serves all host Python versions (>= 3.9). cp312 = build host.
          CIBW_BUILD: "cp312-manylinux_x86_64"

          # Install build dependencies inside the manylinux container.
          # manylinux_2_28 is AlmaLinux 8; gcc-toolset-13 provides GCC 13.
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y gcc-toolset-13-gcc gcc-toolset-13-gcc-c++
            autoconf automake libtool pkg-config
            && echo 'source /opt/rh/gcc-toolset-13/enable' >> /etc/bashrc

          # Ensure GCC 13 is active for the build.
          CIBW_ENVIRONMENT_LINUX: >
            PATH=/opt/rh/gcc-toolset-13/root/usr/bin:$PATH
            CC=gcc CXX=g++

          # Retag platform for PyPI upload. The Python 3.14 runtime is not
          # bundled in the wheel (downloaded post-install), but auditwheel
          # still rejects repair due to glibc symbol versions. A simple
          # retag is sufficient since all shared libs use $ORIGIN RPATH.
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            pip install wheel &&
            python -m wheel tags --platform-tag manylinux_2_28_x86_64 --remove {wheel} &&
            cp $(dirname {wheel})/*manylinux*.whl {dest_dir}/

          # manylinux_2_28 image (AlmaLinux 8, glibc 2.28).
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  # -----------------------------------------------------------------------
  # Publish to TestPyPI (manual trigger only)
  # -----------------------------------------------------------------------
  test-publish:
    name: Publish to TestPyPI
    needs: build-wheels
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch'
    environment: testpypi

    permissions:
      id-token: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          skip-existing: true

  # -----------------------------------------------------------------------
  # Publish to PyPI (version tags only)
  # -----------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi

    permissions:
      id-token: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          password: ${{ secrets.PYPI_API_TOKEN }}
