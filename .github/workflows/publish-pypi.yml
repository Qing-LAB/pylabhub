# .github/workflows/publish-pypi.yml
#
# Publish the pylabhub Python package to PyPI on tagged releases.
#
# Currently publishes the name-reservation placeholder (pyproject.toml).
# Will evolve into a full sdist/wheel build once pybind11 standalone
# modules are ready.
#
# Setup required:
#   1. Create a PyPI API token at https://pypi.org/manage/account/token/
#   2. Add it as a GitHub repository secret named PYPI_API_TOKEN
#   3. Tag a release: git tag v0.1.0a0 && git push --tags
#
# To test first, use TestPyPI:
#   1. Create a token at https://test.pypi.org/manage/account/token/
#   2. Add it as TEST_PYPI_API_TOKEN
#   3. Push to a release/* branch to trigger the test publish

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"          # Trigger on version tags (e.g., v0.1.0a0)
  workflow_dispatch:   # Allow manual trigger from Actions tab

jobs:
  # --- Test publish to TestPyPI (on release branches or manual trigger) ---
  test-publish:
    name: Publish to TestPyPI
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch'
    environment: testpypi

    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade build

      - name: Build sdist
        run: python -m build --sdist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # Uses trusted publishing (OIDC) if configured, otherwise:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          skip-existing: true

  # --- Publish to PyPI (on version tags only) ---
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi

    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade build

      - name: Build sdist
        run: python -m build --sdist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Uses trusted publishing (OIDC) if configured, otherwise:
          password: ${{ secrets.PYPI_API_TOKEN }}
